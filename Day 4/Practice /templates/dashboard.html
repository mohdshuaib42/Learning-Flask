<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        .navbar {
            background: #333;
            padding: 15px;
            color: white;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        Welcome, {{ username }} 👋
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <!-- Content -->
    <div class="container">
        <h2>Dashboard</h2>

        <div class="card">
            <h3>Your Profile</h3>
            <!-- <p>Username: {{ username }}</p> -->
        </div>

        <div class="card">
            <h3>Quick Actions</h3>
            <p>Explore your Flask app features.</p>
        </div>
    </div>

</body>
</html>
