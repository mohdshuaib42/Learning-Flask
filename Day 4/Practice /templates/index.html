<!DOCTYPE html>
<html>
<head>
    <title>Home | Flask App</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .navbar {
            background-color: #333;
            padding: 15px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            text-align: center;
            margin-top: 50px;
        }

        .btn {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('contact') }}">Contact</a>
        <a href="{{ url_for('services') }}">Services</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>Welcome, {{ name }} 👋</h1>
        <p>This is your Flask Home Page</p>

        <a href="{{ url_for('about') }}">
            <button class="btn">Learn More</button>
        </a>
    </div>

</body>
</html>
